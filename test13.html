<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixiJS v8 UIUX + 稜鏡星空 (Premium UIUX Prism)</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #020205; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #instructions { position: absolute; top: 20px; left: 20px; color: #ffffff; pointer-events: none; text-shadow: 0px 0px 5px rgba(0, 243, 255, 0.5); padding: 15px; border-radius: 8px; line-height: 1.5; background: rgba(0, 5, 10, 0.6); border: 1px solid rgba(0, 243, 255, 0.2); backdrop-filter: blur(4px); }
        h3 { margin: 0 0 10px 0; font-weight: normal; letter-spacing: 2px; color: #00f3ff; }
    </style>
    <!-- PixiJS v8 -->
    <script src="https://unpkg.com/pixi.js@8.x/dist/pixi.min.js"></script>
    <!-- Pixi Filters -->
    <script src="https://unpkg.com/pixi-filters@6.x/dist/pixi-filters.js"></script>
</head>
<body>
    <div id="instructions">
        <h3>[ 星穹稜鏡 / STELLAR PRISM ]</h3>
        <p>STATUS: UIUXPRO OVERRIDE<br><br>
        融合版：<br>
        - <b>Expo 彈性曲線</b>：回歸極速爆發、平滑收尾的高級打擊感<br>
        - <b>銳利幾何稜鏡</b>：捨棄模糊的光暈，改用極細的 RGB 銳利射線與光環<br>
        - <b>星空引力波</b>：背景保留宇宙星辰與空間扭曲濾鏡</p>
    </div>

    <script>
        (async () => {
            const app = new PIXI.Application();
            await app.init({
                width: window.innerWidth,
                height: window.innerHeight,
                backgroundColor: 0x020205, 
                resizeTo: window
            });
            document.body.appendChild(app.canvas);

            // 1. 星空背景 (Starry Sky)
            const bgContainer = new PIXI.Container();
            app.stage.addChild(bgContainer);
            
            const starsGraphics = new PIXI.Graphics();
            for(let i=0; i<300; i++) {
                let sx = Math.random() * window.innerWidth;
                let sy = Math.random() * window.innerHeight;
                let size = Math.random() * 1.5;
                let alpha = 0.2 + Math.random() * 0.8;
                starsGraphics.circle(sx, sy, size).fill({ color: 0xffffff, alpha: alpha });
            }
            bgContainer.addChild(starsGraphics);

            // 空間扭曲濾鏡 (Shockwave)
            const shockwaveOptions = {
                center: { x: window.innerWidth / 2, y: window.innerHeight / 2 },
                amplitude: 50, // 降低震幅，保持 UIUX 乾淨質感
                wavelength: 200,
                speed: 1500,
                brightness: 1.2,
                radius: -1,
                time: 0
            };
            const shockwaveFilter = new PIXI.filters.ShockwaveFilter(shockwaveOptions);
            bgContainer.filters = [shockwaveFilter];

            // ----------------------------------------------------
            // 2. 幾何稜鏡 UI 圖層 (Sharp Geometric Prism)
            // ----------------------------------------------------
            const uiContainer = new PIXI.Container();
            app.stage.addChild(uiContainer);

            // 我們用 3 條極細的純色線條來做稜鏡，取代之前髒髒的模糊色塊
            const ringRed = new PIXI.Graphics();
            const ringGreen = new PIXI.Graphics();
            const ringBlue = new PIXI.Graphics();
            
            ringRed.blendMode = 'add';
            ringGreen.blendMode = 'add';
            ringBlue.blendMode = 'add';

            // 外圍的光環 (主環)
            const mainRing = new PIXI.Graphics();
            mainRing.blendMode = 'add';
            const blurOptions = new PIXI.BlurFilter();
            blurOptions.strength = 4;
            mainRing.filters = [blurOptions];

            uiContainer.addChild(ringBlue);
            uiContainer.addChild(ringGreen);
            uiContainer.addChild(ringRed);
            uiContainer.addChild(mainRing);

            const sparkContainer = new PIXI.Container();
            uiContainer.addChild(sparkContainer);
            let activeSparks = [];

            // ----------------------------------------------------
            // 動畫邏輯 (回歸 UIUXPRO 的 Expo Ease Out)
            // ----------------------------------------------------
            let isAnimating = false;
            let expTime = 0;
            let expX = 0;
            let expY = 0;

            function easeOutExpo(x) {
                return x === 1 ? 1 : 1 - Math.pow(2, -10 * x);
            }

            function triggerExplosion(x, y) {
                expX = x;
                expY = y;
                expTime = 0;
                
                shockwaveFilter.center.x = x;
                shockwaveFilter.center.y = y;
                shockwaveFilter.time = 0;

                sparkContainer.removeChildren();
                activeSparks = [];

                // 產生 UIUX 風格的銳利「光速射線」(非凌亂碎屑)
                for(let i = 0; i < 40; i++) {
                    const spark = new PIXI.Graphics();
                    spark.blendMode = 'add';
                    
                    const angle = Math.random() * Math.PI * 2;
                    // 極高速的射線
                    const velocity = 1000 + Math.random() * 3000;
                    const length = 20 + Math.random() * 100;
                    const thickness = 1 + Math.random() * 2;
                    
                    // 用 RGB 顏色交替，呼應稜鏡主題
                    const colors = [0xff0000, 0x00ff00, 0x0000ff, 0xffffff, 0x00f3ff];
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    
                    spark.rect(0, -thickness/2, length, thickness).fill(color);
                    
                    // 讓射線一開始不是從正中心出發，而是有個內圈留白
                    let startOffset = 50 + Math.random() * 100;
                    spark.position.set(x + Math.cos(angle)*startOffset, y + Math.sin(angle)*startOffset);
                    spark.rotation = angle;
                    
                    sparkContainer.addChild(spark);
                    activeSparks.push({
                        sprite: spark,
                        vx: Math.cos(angle) * velocity,
                        vy: Math.sin(angle) * velocity,
                        life: 1.0, 
                        decayRate: 2.0 + Math.random() * 3.0 // 衰減極快
                    });
                }
                
                isAnimating = true;
            }

            app.ticker.add((ticker) => {
                if (!isAnimating) return;
                
                const dt = ticker.deltaMS / 1000;
                expTime += dt;
                
                const maxTime = 1.2; // 縮短總時間，讓節奏更緊湊
                let progress = expTime / maxTime;
                if (progress > 1) progress = 1;
                
                // 核心：UIUX 的靈魂曲線
                let easeOut = easeOutExpo(progress);

                // 1. 空間扭曲
                shockwaveFilter.time += dt;
                shockwaveFilter.amplitude = 50 * (1 - progress); 

                // ✨ 2. 幾何稜鏡環 (Sharp Prism Rings)
                ringRed.clear();
                ringGreen.clear();
                ringBlue.clear();
                mainRing.clear();
                
                const baseRadius = 800 * easeOut;
                
                if (baseRadius > 10) {
                    const alpha = 1 - progress;
                    
                    // 紅光最快，綠光居中，藍光最慢
                    // 線條極細 (width: 1~2)，維持科技與俐落感
                    ringRed.alpha = alpha;
                    ringRed.circle(expX, expY, baseRadius * 1.05).stroke({ width: 2, color: 0xff0000 });
                    
                    ringGreen.alpha = alpha;
                    ringGreen.circle(expX, expY, baseRadius * 1.00).stroke({ width: 2, color: 0x00ff00 });
                    
                    ringBlue.alpha = alpha;
                    ringBlue.circle(expX, expY, baseRadius * 0.95).stroke({ width: 2, color: 0x0000ff });

                    // 主暈環 (白色微發光)，包覆在最外層
                    mainRing.alpha = (1 - Math.pow(progress, 1.5)) * 0.8;
                    mainRing.circle(expX, expY, baseRadius * 1.02).stroke({ width: 6 * (1 - progress), color: 0xffffff });
                }

                // 3. 銳利光速射線 (Sparks)
                for(let i = activeSparks.length - 1; i >= 0; i--) {
                    let s = activeSparks[i];
                    s.life -= dt * s.decayRate;
                    
                    if (s.life <= 0) {
                        sparkContainer.removeChild(s.sprite);
                        activeSparks.splice(i, 1);
                        continue;
                    }
                    
                    // 用 easeOut 精神，一開始噴射極快，瞬間停止
                    s.vx *= 0.85;
                    s.vy *= 0.85;
                    
                    s.sprite.x += s.vx * dt;
                    s.sprite.y += s.vy * dt;
                    s.sprite.alpha = Math.pow(s.life, 2);
                    s.sprite.scale.x = s.life; 
                }

                if (progress >= 1) {
                    isAnimating = false;
                    shockwaveFilter.amplitude = 0;
                }
            });

            // 綁定點擊事件
            app.canvas.addEventListener('pointerdown', (e) => {
                triggerExplosion(e.clientX, e.clientY);
            });

            // 首次展示
            setTimeout(() => triggerExplosion(window.innerWidth / 2, window.innerHeight / 2), 500);
        })();
    </script>
</body>
</html>
