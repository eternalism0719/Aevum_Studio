<!-- Aevum Studio Shared Topbar Component -->

<!-- 1. HTML Structure -->
<header class="glass-nav" id="main-nav">
    <div class="nav-left-wrap">
        <a href="index.html" class="logo" aria-label="Aevum Studio Home">
            <img src="images/LOGO_pj_BG.png" alt="" class="logo-img">
            AEVUM <span>STUDIO</span>
            <div class="logo-pulse"></div>
        </a>
    </div>
    
    <nav id="nav-links" aria-label="Main navigation">
        <a href="project.html" class="nav-link bh-transition">PROJECT</a>
        <a href="brand.html" class="nav-link">BRAND</a>
        <a href="3d_lab.html" class="nav-link">EXPERIMENT</a>
        <a href="games.html" class="nav-link">GAMES</a>
    </nav>

<!-- 2. Required CSS (Extract from style.css) -->
<style>
.glass-nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 0.8rem 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(5, 5, 10, 0.7);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid var(--border, rgba(255, 255, 255, 0.06));
    z-index: 2005;
    transition: background 0.4s, box-shadow 0.4s;
}

.glass-nav.scrolled {
    background: rgba(5, 5, 10, 0.92);
    box-shadow: 0 4px 40px rgba(0, 0, 0, 0.5);
}

.nav-left-wrap {
    display: flex;
    align-items: center;
    gap: 2.5rem;
}

.logo {
    display: flex;
    align-items: center;
    font-family: 'Anson', sans-serif;
    font-size: 1.36rem;
    font-weight: 500;
    color: #ffffff;
    letter-spacing: 8px;
    position: relative;
    gap: 14px;
    text-decoration: none;
}

.logo-img {
    height: 32px;
    width: auto;
    filter: drop-shadow(0 0 12px rgba(0, 243, 255, 0.5));
}

.logo span {
    color: #00f3ff;
    text-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
}

.logo-pulse {
    width: 6px; height: 6px;
    background: #00f3ff;
    border-radius: 50%;
    margin-left: 4px;
    box-shadow: 0 0 8px #00f3ff;
    animation: logoPulse 2s ease-in-out infinite;
}

@keyframes logoPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.6); }
}

#nav-links {
    display: flex;
    align-items: center;
    gap: 2rem;
}

.nav-link {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    color: #b0b0cc;
    letter-spacing: 3px;
    font-weight: 600;
    position: relative;
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.3s;
    text-decoration: none;
}

.nav-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid #666680;
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
}

.nav-link::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 12px; right: 0;
    height: 1px;
    background: #00f3ff;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease-out;
}

.nav-link:hover, .nav-link.active {
    color: #ffffff;
}

.nav-link:hover .nav-dot, .nav-link.active .nav-dot {
    background: #00f3ff;
    border-color: #00f3ff;
    box-shadow: 0 0 8px #00f3ff;
}

.nav-link:hover::after, .nav-link.active::after {
    transform: scaleX(1);
}

.nav-link.active {
    color: #00f3ff;
    text-shadow: 0 0 8px rgba(0, 243, 255, 0.1);
}
</style>

<!-- 3. Logic (Extract from main.js) -->
<script>
function initNavScroll() {
    const nav = document.getElementById('main-nav');
    const hero = document.getElementById('hero');
    if (!nav) return;
    
    window.addEventListener('scroll', () => {
        //皛曉?頞? hero 擃漲??80px ?????舀楛摨?        const threshold = hero ? hero.offsetHeight : 80;
        nav.classList.toggle('scrolled', window.scrollY >= threshold);
    }, { passive: true });
}

document.addEventListener('DOMContentLoaded', initNavScroll);
</script>
