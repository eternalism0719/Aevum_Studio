<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixiJS v8 行星爆炸特效 (Planetary Explosion)</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050510; font-family: sans-serif; }
        canvas { display: block; }
        #instructions { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 1px 1px 2px black; background: rgba(0, 0, 0, 0.5); padding: 15px; border-radius: 8px; line-height: 1.5; }
        h3 { margin: 0 0 10px 0; color: #00f3ff; }
    </style>
    <!-- PixiJS v8 -->
    <script src="https://unpkg.com/pixi.js@8.x/dist/pixi.min.js"></script>
    <!-- Pixi Filters (v6 for v8 compatibility) -->
    <script src="https://unpkg.com/pixi-filters@6.x/dist/pixi-filters.js"></script>
</head>
<body>
    <div id="instructions">
        <h3>🌌 行星爆炸 (Cosmic Explosion)</h3>
        <p>點擊畫面任意位置引爆。<br>這個特效結合了 5 個 2D 特效圖層：<br>
        1. <b>核心閃光 (Core Flash)</b>: 瞬間致盲高光<br>
        2. <b>空間扭曲 (Shockwave Filter)</b>: 物理破壞感<br>
        3. <b>雙層衝擊環 (Blast Ring)</b>: 高能邊緣<br>
        4. <b>放射火花 (Sparks)</b>: 具備物理阻力的粒子<br>
        5. <b>星雲餘輝 (Afterglow)</b>: 殘留的宇宙塵埃</p>
    </div>

    <script>
        (async () => {
            const app = new PIXI.Application();
            await app.init({
                width: window.innerWidth,
                height: window.innerHeight,
                backgroundColor: 0x050510, // 深邃宇宙藍黑
                resizeTo: window
            });
            document.body.appendChild(app.canvas);

            // 1. 建立背景容器 (用來被 Shockwave 扭曲)
            const bgContainer = new PIXI.Container();
            app.stage.addChild(bgContainer);
            
            // 畫個網格與行星作為參考點
            const bg = new PIXI.Graphics();
            for(let i = 0; i <= window.innerWidth; i += 60) { bg.moveTo(i, 0).lineTo(i, window.innerHeight); }
            for(let j = 0; j <= window.innerHeight; j += 60) { bg.moveTo(0, j).lineTo(window.innerWidth, j); }
            bg.stroke({ width: 1, color: 0x111122 });
            
            bg.circle(window.innerWidth * 0.2, window.innerHeight * 0.3, 100).fill(0x3322ff); // 藍色星球
            bg.circle(window.innerWidth * 0.8, window.innerHeight * 0.7, 60).fill(0x00ffcc);  // 青色星球
            bgContainer.addChild(bg);

            // 加入空間扭曲濾鏡
            const shockwaveOptions = {
                center: { x: window.innerWidth / 2, y: window.innerHeight / 2 },
                amplitude: 120,    // 極端扭曲
                wavelength: 300,
                speed: 1800,
                brightness: 2.0,
                radius: -1,
                time: 0
            };
            const shockwaveFilter = new PIXI.filters.ShockwaveFilter(shockwaveOptions);
            bgContainer.filters = [shockwaveFilter];

            // ----------------------------------------------------
            // 2. 建立視覺特效容器 (VFX Layers) - 在背景之上
            // ----------------------------------------------------
            const vfxContainer = new PIXI.Container();
            app.stage.addChild(vfxContainer);

            // 【圖層 A】：星雲餘輝 (Afterglow) - 留下來的煙霧/光芒
            const afterglow = new PIXI.Graphics();
            afterglow.blendMode = 'add';
            const afterglowBlur = new PIXI.BlurFilter();
            afterglowBlur.strength = 40;
            afterglow.filters = [afterglowBlur];
            vfxContainer.addChild(afterglow);

            // 【圖層 B】：雙層衝擊環 (Blast Ring) - 主視覺高能邊緣
            const ringGraphics = new PIXI.Graphics();
            ringGraphics.blendMode = 'add';
            const ringBlur = new PIXI.BlurFilter();
            ringBlur.strength = 12;
            ringGraphics.filters = [ringBlur];
            vfxContainer.addChild(ringGraphics);

            // 【圖層 C】：放射火花 (Sparks) - 飛濺的高能粒子
            const sparkContainer = new PIXI.Container();
            vfxContainer.addChild(sparkContainer);
            let activeSparks = [];

            // 【圖層 D】：核心閃光 (Core Flash) - 爆炸瞬間的致盲光
            const coreFlash = new PIXI.Graphics();
            coreFlash.blendMode = 'add';
            const flashBlur = new PIXI.BlurFilter();
            flashBlur.strength = 20;
            coreFlash.filters = [flashBlur];
            vfxContainer.addChild(coreFlash);

            // ----------------------------------------------------
            // 動畫狀態與配色
            // ----------------------------------------------------
            let isAnimating = false;
            let expTime = 0;
            let expX = 0;
            let expY = 0;
            
            // 宇宙/科技感配色 (可以隨意更改為紫色、紅色等)
            const colorFlash = 0xffffff;       // 純白
            const colorRingOuter = 0x00f3ff;   // 青藍色 (Cyan)
            const colorRingInner = 0xffffff;   // 純白
            const colorAfterglow = 0x4a00e0;   // 深邃宇宙紫
            const colorSparks = [0x00f3ff, 0xffffff, 0x0088ff, 0x8a2be2];

            function triggerExplosion(x, y) {
                expX = x;
                expY = y;
                expTime = 0;
                
                // 重置濾鏡
                shockwaveFilter.center.x = x;
                shockwaveFilter.center.y = y;
                shockwaveFilter.time = 0;

                // 清除上一波的粒子
                sparkContainer.removeChildren();
                activeSparks = [];

                // 產生新粒子 (火花)
                for(let i = 0; i < 40; i++) {
                    const spark = new PIXI.Graphics();
                    spark.blendMode = 'add';
                    const color = colorSparks[Math.floor(Math.random() * colorSparks.length)];
                    
                    // 隨機角度與速度
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 800 + Math.random() * 2000; // 每秒 800~2800 像素的高速噴發
                    const length = 20 + Math.random() * 80;
                    const thickness = 2 + Math.random() * 5;
                    
                    // 畫出帶有方向性的線條 (長條矩形)
                    spark.rect(0, -thickness/2, length, thickness).fill(color);
                    spark.position.set(x, y);
                    spark.rotation = angle;
                    
                    sparkContainer.addChild(spark);
                    activeSparks.push({
                        sprite: spark,
                        vx: Math.cos(angle) * velocity,
                        vy: Math.sin(angle) * velocity,
                        life: 1.0, 
                        decayRate: 1.0 + Math.random() * 2.5 // 粒子消失的速度不同
                    });
                }
                
                isAnimating = true;
            }

            // ----------------------------------------------------
            // 每一影格的渲染邏輯 (Ticker)
            // ----------------------------------------------------
            app.ticker.add((ticker) => {
                if (!isAnimating) return;
                
                const dt = ticker.deltaMS / 1000;
                expTime += dt;
                
                const maxTime = 1.5; // 爆炸特效總時長 1.5 秒
                let progress = expTime / maxTime;
                if (progress > 1) progress = 1;
                
                // 通用的拋物線衰減 (一開始強烈，後面平緩)
                let easeOut = 1 - Math.pow(progress, 2);

                // 1. 更新空間扭曲 (ShockwaveFilter)
                shockwaveFilter.time += dt;
                shockwaveFilter.amplitude = 120 * easeOut;
                shockwaveFilter.brightness = 1.0 + (1.5 * easeOut);

                // 2. 更新核心閃光 (在 0.15 秒內極速爆發並消失)
                coreFlash.clear();
                let flashProgress = expTime / 0.15;
                if (flashProgress <= 1) {
                    // 極速拋物線
                    let flashEase = 1 - Math.pow(flashProgress, 2);
                    coreFlash.alpha = flashEase;
                    coreFlash.circle(expX, expY, 200 * (1 - flashEase)).fill(colorFlash);
                }

                // 3. 更新星雲餘輝 (緩慢擴張並消失)
                afterglow.clear();
                afterglow.alpha = easeOut * 0.8;
                // progress 的 0.5 次方會讓一開始擴大得快，後來變慢
                afterglow.circle(expX, expY, 500 * Math.pow(progress, 0.5)).fill(colorAfterglow);

                // 4. 更新雙層衝擊環
                ringGraphics.clear();
                const ringRadius = shockwaveFilter.time * shockwaveFilter.speed; 
                const outerThickness = 80 * easeOut;
                const innerThickness = 20 * easeOut;
                
                if (outerThickness > 1) {
                    ringGraphics.alpha = easeOut;
                    ringGraphics.circle(expX, expY, ringRadius).stroke({ width: outerThickness, color: colorRingOuter, alpha: 0.6, alignment: 0.5 });
                    ringGraphics.circle(expX, expY, ringRadius).stroke({ width: innerThickness, color: colorRingInner, alpha: 1.0, alignment: 0.5 });
                }

                // 5. 更新粒子火花 (加入空氣阻力 Physics Drag)
                for(let i = activeSparks.length - 1; i >= 0; i--) {
                    let s = activeSparks[i];
                    s.life -= dt * s.decayRate;
                    
                    if (s.life <= 0) {
                        sparkContainer.removeChild(s.sprite);
                        activeSparks.splice(i, 1);
                        continue;
                    }
                    
                    // 空氣阻力：速度不斷打折扣，產生「噴出後急停」的張力
                    s.vx *= 0.92;
                    s.vy *= 0.92;
                    
                    s.sprite.x += s.vx * dt;
                    s.sprite.y += s.vy * dt;
                    s.sprite.alpha = s.life;
                    
                    // 粒子快死掉時，長度縮短
                    s.sprite.scale.x = s.life; 
                }

                // 結束判斷
                if (progress >= 1) {
                    isAnimating = false;
                    shockwaveFilter.amplitude = 0;
                }
            });

            // 綁定點擊事件
            app.canvas.addEventListener('pointerdown', (e) => {
                triggerExplosion(e.clientX, e.clientY);
            });

            // 網頁載入時先在中間炸一次
            setTimeout(() => triggerExplosion(window.innerWidth / 2, window.innerHeight / 2), 500);
        })();
    </script>
</body>
</html>
