<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Glass Refraction Lab - Aevum Studio</title>
    <style>
        :root {
            --bg: #050508;
            --accent: #00f3ff;
            --secondary: #ff0055;
            --text: #ffffff;
            --ui-bg: rgba(15, 15, 20, 0.9);
        }
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: var(--bg); font-family: 'Inter', sans-serif;
            color: var(--text);
        }
        #ui-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 100;
            padding: 40px; display: flex; flex-direction: column; justify-content: space-between;
        }
        .header h1 { font-size: 1.2rem; font-weight: 300; letter-spacing: 0.8rem; margin: 0; opacity: 0.8; text-transform: uppercase; }
        .header p { font-size: 0.6rem; letter-spacing: 0.3rem; opacity: 0.4; margin-top: 10px; font-family: 'JetBrains Mono', monospace; }
        .footer {
            display: flex; justify-content: space-between; align-items: flex-end;
            font-size: 0.55rem; letter-spacing: 0.2rem; opacity: 0.3; text-transform: uppercase;
        }
        .hud-corner { position: absolute; width: 20px; height: 20px; border: 1px solid rgba(0, 243, 255, 0.2); }
        .top-left { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .bottom-right { bottom: 20px; right: 20px; border-left: none; border-top: none; }
        
        canvas { display: block; }

        /* Custom UI Styling */
        .tp-dfwv { z-index: 500 !important; width: 330px !important; }
        
        /* Alche Trackball Styling */
        .trackball-container {
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0; background: transparent; cursor: default;
        }
        .quat-values {
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            color: #666; margin-bottom: 12px; letter-spacing: 1px;
        }
        #axis-widget-target {
            width: 160px; height: 160px; pointer-events: auto;
            border-radius: 50%; background: radial-gradient(circle at center, rgba(30,30,40,0.4) 0%, transparent 80%);
            cursor: grab;
        }
        #axis-widget-target:active { cursor: grabbing; }
        
        .reset-btn {
            background: transparent; border: none; color: #888;
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            margin-top: 15px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: all 0.3s;
            padding: 5px 10px;
        }
        .reset-btn:hover { color: var(--accent); opacity: 1; text-shadow: 0 0 10px var(--accent); }

        .vignette { position: fixed; inset: 0; z-index: 50; pointer-events: none; background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.8) 100%); }
        .noise { position: fixed; inset: 0; z-index: 51; pointer-events: none; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        .transition-btn { position: absolute; bottom: 40px; left: 40px; z-index: 900; background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 12px 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; transition: all 0.3s; }
        .transition-btn:hover { background: rgba(0, 243, 255, 0.1); box-shadow: 0 0 15px rgba(0, 243, 255, 0.3); }
    </style>
    <!-- 引入 V5 預快照轉場引擎 (0ms 延遲) -->
    <script src="https://pixijs.download/release/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-filters@latest/dist/pixi-filters.js"></script>
    <script src="js/page-transition-v4.js"></script>
</head>
<body>
    <div class="vignette"></div>
    <div class="noise"></div>
    
    <div id="ui-overlay">
        <div class="hud-corner top-left"></div>
        <div class="hud-corner bottom-right"></div>
        <div class="header">
            <div class="hud-label">REFRACTION_LAB.v6.2</div>
            <div class="status-indicator active"></div>
            <div class="hud-status">SYSTEM READY</div>
        </div>
        <div class="footer">
            <span>[ REMOTE_LINK_ACTIVE ]</span>
            <span>UI ORIENTATION SYNC // 3D HUD</span>
            <span>OS_BUILD_2026.04</span>
        </div>
    </div>
    
    <button class="transition-btn" onclick="window.transitionToPage('games.html', event)">[ SYSTEM.TRANSFER ]</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { Pane } from 'https://cdn.jsdelivr.net/npm/tweakpane@4.0.1/dist/tweakpane.min.js';

        // --- Config ---
        const params = {
            color: '#ffffff',
            attenuationColor: '#e6f2ff',
            transmission: 1.0, ior: 1.5, thickness: 3.5, roughness: 0.1, specularIntensity: 1.0,
            dispersion: 0.0, // Prism chromatic aberration (disabled for performance)
            noiseIntensity: 0.05, noiseScale: 4.0, exposure: 1.0, bloomStrength: 0.5,
            quaternion: { x: 0, y: 0, z: 0, w: 1 }
        };

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = params.exposure;
        document.body.appendChild(renderer.domElement);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), params.bloomStrength, 0.4, 0.85);
        composer.addPass(bloomPass);

        // --- Alche Widget Scene & Interactivity ---
        const widgetScene = new THREE.Scene();
        const widgetCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 10);
        widgetCamera.position.set(0, 0, 4);
        const widgetGroup = new THREE.Group();
        widgetScene.add(widgetGroup);

        // Axis Visuals
        const createRing = (rot) => {
            const geom = new THREE.RingGeometry(1.2, 1.205, 64);
            const mat = new THREE.MeshBasicMaterial({ color: 0x222222, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.rotation.copy(rot);
            widgetGroup.add(mesh);
        };
        createRing(new THREE.Euler(0, 0, 0));
        createRing(new THREE.Euler(0, Math.PI/2, 0));
        createRing(new THREE.Euler(Math.PI/2, 0, 0));

        const createDot = (pos, color, label) => {
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), new THREE.MeshBasicMaterial({ color }));
            sphere.position.copy(pos);
            widgetGroup.add(sphere);
        };
        createDot(new THREE.Vector3(1.2, 0, 0), 0xff4444); // X
        createDot(new THREE.Vector3(0, 1.2, 0), 0x44ff44); // Y
        createDot(new THREE.Vector3(0, 0, 1.2), 0x4444ff); // Z
        createDot(new THREE.Vector3(-1.2, 0, 0), 0x333333); // -X

        const widgetRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        widgetRenderer.setSize(160, 160);

        // Interactive Tracking Logics
        let isDragging = false;
        let previousMouse = { x: 0, y: 0 };
        let lastInteractTime = Date.now();
        const widgetTarget = document.createElement('div');
        widgetTarget.id = 'axis-widget-target';
        const mouse = new THREE.Vector2(0, 0);

        // Targeted quaternion for damped (eased) movement
        const targetQuat = new THREE.Quaternion();
        const dragVelocity = new THREE.Vector2(0, 0);

        const handleMouseDown = (e) => { 
            isDragging = true; 
            previousMouse = { x: e.clientX, y: e.clientY }; 
            dragVelocity.set(0, 0); // Stop momentum on grab
            lastInteractTime = Date.now();
        };

        widgetTarget.addEventListener('mousedown', handleMouseDown);
        renderer.domElement.addEventListener('mousedown', handleMouseDown);

        window.addEventListener('mouseup', () => { 
            isDragging = false; 
            lastInteractTime = Date.now();
        });

        const targetHoverQuat = new THREE.Quaternion();
        const currentHoverQuat = new THREE.Quaternion();

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            lastInteractTime = Date.now();

            if (isDragging) {
                // Calculate instant velocity instead of direct rotation
                dragVelocity.x = (e.clientX - previousMouse.x) * 0.008;
                dragVelocity.y = (e.clientY - previousMouse.y) * 0.008;
                previousMouse = { x: e.clientX, y: e.clientY };
            }
        });

        // --- Tweakpane UI ---
        const pane = new Pane({ title: 'REFRACTION LAB TOOLS', expanded: true });
        const matFolder = pane.addFolder({ title: 'Glass Material' });
        matFolder.addBinding(params, 'color', { label: 'Base Color' });
        matFolder.addBinding(params, 'attenuationColor', { label: 'Volume Color' });
        matFolder.addBinding(params, 'transmission', { min: 0.0, max: 1.0, label: 'Transparency' });
        matFolder.addBinding(params, 'ior', { min: 1.0, max: 2.33, label: 'Refraction (IOR)' });
        matFolder.addBinding(params, 'dispersion', { min: 0.0, max: 5.0, label: 'Prism (Dispersion)' });
        matFolder.addBinding(params, 'thickness', { min: 0.0, max: 10.0, label: 'Thickness' });
        matFolder.addBinding(params, 'roughness', { min: 0.0, max: 0.5, label: 'Roughness' });

        const logoFolder = pane.addFolder({ title: 'MainLogo Quaternion' });
        const alcheWrapper = document.createElement('div');
        alcheWrapper.className = 'trackball-container';
        alcheWrapper.innerHTML = `
            <div class="quat-values" id="quat-display">-.00 | .00 | -.00 | 1.0</div>
            <div class="widget-mount"></div>
            <button class="reset-btn" id="reset-quat">Reset Orientation</button>
        `;
        logoFolder.element.appendChild(alcheWrapper);
        alcheWrapper.querySelector('.widget-mount').appendChild(widgetTarget);
        widgetTarget.appendChild(widgetRenderer.domElement);
        alcheWrapper.querySelector('#reset-quat').onclick = () => {
             targetQuat.set(0, 0, 0, 1);
             dragVelocity.set(0, 0);
             lastInteractTime = Date.now();
        };

        const postFolder = pane.addFolder({ title: 'Scene Global' });
        postFolder.addBinding(params, 'exposure', { min: 0.1, max: 2.0, label: 'Exposure' });
        postFolder.addBinding(params, 'bloomStrength', { min: 0.0, max: 2.0, label: 'Bloom' });

        pane.on('change', () => {
             if (!mainModel) return;
             renderer.toneMappingExposure = params.exposure;
             bloomPass.strength = params.bloomStrength;
             mainModel.traverse(c => {
                 if (c.isMesh) {
                     c.material.color.set(params.color);
                     c.material.attenuationColor.set(params.attenuationColor);
                     child_mat_update(c.material);
                 }
             });
        });
        
        function child_mat_update(mat) {
             mat.transmission = params.transmission;
             mat.ior = params.ior;
             mat.dispersion = params.dispersion;
             mat.thickness = params.thickness;
             mat.roughness = params.roughness;
        }

        // --- Background ---
        const worldTex = (() => {
            const c = document.createElement('canvas'); c.width = 2048; c.height = 1024;
            const ctx = c.getContext('2d'); ctx.fillStyle = '#050508'; ctx.fillRect(0, 0, c.width, c.height);
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.12)'; ctx.lineWidth = 2; const step = 64;
            for (let x = 0; x <= c.width; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, c.height); ctx.stroke(); }
            for (let y = 0; y <= c.height; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(c.width, y); ctx.stroke(); }
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'; ctx.font = '900 140px Inter, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('AEVUM', c.width / 2, c.height / 2);
            const t = new THREE.CanvasTexture(c); t.mapping = THREE.EquirectangularReflectionMapping; return t;
        })();
        const grid = new THREE.Mesh(new THREE.SphereGeometry(40, 64, 32), new THREE.MeshBasicMaterial({ map: worldTex, side: THREE.BackSide }));
        scene.add(grid); scene.background = worldTex;
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const spotlight = new THREE.SpotLight(0x00f3ff, 100); spotlight.position.set(0, 5, 10); scene.add(spotlight);

        // --- Loading ---
        let mainModel = null;
        new RGBELoader().load('./images/monochrome_studio_02_1k.hdr', (tex) => {
            tex.mapping = THREE.EquirectangularReflectionMapping; scene.environment = tex;
            new GLTFLoader().load('./3D modeling/base_basic_shaded.glb', (gltf) => {
                mainModel = gltf.scene;
                const box = new THREE.Box3().setFromObject(mainModel);
                const scale = 5 / Math.max(...box.getSize(new THREE.Vector3())); mainModel.scale.set(scale, scale, scale);
                mainModel.position.sub(box.getCenter(new THREE.Vector3()));
                mainModel.traverse(c => {
                    if (c.isMesh) {
                        c.material = new THREE.MeshPhysicalMaterial({
                            color: new THREE.Color(params.color), transmission: params.transmission, ior: params.ior, 
                            dispersion: 0, thickness: params.thickness, roughness: params.roughness,
                            envMapIntensity: 2.5, clearcoat: 1, attenuationColor: new THREE.Color(params.attenuationColor), attenuationDistance: 1.5, side: THREE.FrontSide, transparent: true
                        });
                    }
                });
                scene.add(mainModel);
            });
        });

        // --- Animation Loop ---
        const identityQuat = new THREE.Quaternion();

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            
            if (typeof spotlight !== 'undefined') {
                spotlight.position.x += ((mouse.x * 5) - spotlight.position.x) * 0.03;
                spotlight.position.y += ((mouse.y * 5 + 10) - spotlight.position.y) * 0.03;
            }

            if (mainModel) {
                grid.rotation.y += 0.001;
                
                // --- Momentum Physics ---
                if (!isDragging) {
                    dragVelocity.multiplyScalar(0.92); // Friction decay for "throw" momentum
                }
                
                if (Math.abs(dragVelocity.x) > 0.0001 || Math.abs(dragVelocity.y) > 0.0001) {
                    const qX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), dragVelocity.x);
                    const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), dragVelocity.y);
                    targetQuat.multiplyQuaternions(qX, targetQuat);
                    targetQuat.multiplyQuaternions(qY, targetQuat);
                }
                
                // 1. Continuous Auto-Return for Drag Rotation (Very Slow, No Delay)
                if (!isDragging) {
                    targetQuat.slerp(identityQuat, 0.008); 
                } 
                
                // Hover target constantly tracks mouse
                targetHoverQuat.setFromEuler(new THREE.Euler(mouse.y * 0.25, mouse.x * 0.25, 0));

                // 2. Liquid Viscosity Interpolation
                widgetGroup.quaternion.slerp(targetQuat, 0.12); // Heavier drag tracking
                currentHoverQuat.slerp(targetHoverQuat, 0.025); // Extreme viscous hover lag (~0.6s response)
                
                // 3. Final Assembly
                mainModel.quaternion.copy(widgetGroup.quaternion).multiply(currentHoverQuat);
                
                mainModel.position.y = Math.sin(time * 0.5) * 0.15; // Auto breathing
                
                const q = mainModel.quaternion;
                document.getElementById('quat-display').innerText = `${q.x.toFixed(2)} | ${q.y.toFixed(2)} | ${q.z.toFixed(2)} | ${q.w.toFixed(2)}`;
            }
            composer.render();
            widgetRenderer.render(widgetScene, widgetCamera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
