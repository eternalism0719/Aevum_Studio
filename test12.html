<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixiJS v8 稜鏡行星爆炸 (Prism Planetary Explosion)</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #020205; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #instructions { position: absolute; top: 20px; left: 20px; color: #ffffff; pointer-events: none; text-shadow: 0px 0px 5px rgba(255, 255, 255, 0.5); padding: 15px; border-radius: 8px; line-height: 1.5; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); }
        h3 { margin: 0 0 10px 0; font-weight: normal; letter-spacing: 2px; }
        .gradient-text {
            background: linear-gradient(90deg, #ff0055, #00ffaa, #0055ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
    <!-- PixiJS v8 -->
    <script src="https://unpkg.com/pixi.js@8.x/dist/pixi.min.js"></script>
    <!-- Pixi Filters -->
    <script src="https://unpkg.com/pixi-filters@6.x/dist/pixi-filters.js"></script>
</head>
<body>
    <div id="instructions">
        <h3 class="gradient-text">✨ 稜鏡星爆 (Prism Starburst)</h3>
        <p>「鼠標即是行星爆炸的源頭」<br><br>
        故事設定升級：<br>
        - <b>星空背景</b>：模擬浩瀚宇宙<br>
        - <b>光譜散射 (Prism Effect)</b>：<br>  利用 RGB 三原色光圈在不同半徑疊加，<br>  創造出邊緣產生「彩虹色差」的自然稜鏡感！<br>
        - <b>扭曲引力波</b>：讓背後的星空產生空間塌陷的錯覺</p>
    </div>

    <script>
        (async () => {
            const app = new PIXI.Application();
            await app.init({
                width: window.innerWidth,
                height: window.innerHeight,
                backgroundColor: 0x020205, // 深邃宇宙黑
                resizeTo: window
            });
            document.body.appendChild(app.canvas);

            // 1. 星空背景 (Starry Sky)
            const bgContainer = new PIXI.Container();
            app.stage.addChild(bgContainer);
            
            const starsGraphics = new PIXI.Graphics();
            // 隨機產生 400 顆星星
            for(let i=0; i<400; i++) {
                let sx = Math.random() * window.innerWidth;
                let sy = Math.random() * window.innerHeight;
                let size = Math.random() * 1.5; // 星星大小
                let alpha = 0.1 + Math.random() * 0.9;
                
                // 偶爾給點藍色或黃色的恆星
                let color = 0xffffff;
                let randC = Math.random();
                if (randC > 0.8) color = 0xaaddff; // 藍星
                else if (randC > 0.6) color = 0xffddaa; // 黃星

                starsGraphics.circle(sx, sy, size).fill({ color: color, alpha: alpha });
            }
            bgContainer.addChild(starsGraphics);

            // 加入空間扭曲濾鏡，讓爆炸時星星會被拉扯
            const shockwaveOptions = {
                center: { x: window.innerWidth / 2, y: window.innerHeight / 2 },
                amplitude: 80,
                wavelength: 250,
                speed: 1500,
                brightness: 1.2,
                radius: -1,
                time: 0
            };
            const shockwaveFilter = new PIXI.filters.ShockwaveFilter(shockwaveOptions);
            bgContainer.filters = [shockwaveFilter];

            // ----------------------------------------------------
            // 2. 稜鏡爆炸特效圖層 (Prism Explosion)
            // ----------------------------------------------------
            const vfxContainer = new PIXI.Container();
            app.stage.addChild(vfxContainer);

            // 【核心秘訣】：模擬三稜鏡 (Prism Dispersion)
            // 分別繪製紅、綠、藍三個發光環。
            // 利用 blendMode = 'add'，當三個環重疊時會變成純白光，
            // 但如果把它們的半徑稍微錯開，邊緣就會透出彩虹般的稜鏡色差！
            const ringRed = new PIXI.Graphics();
            const ringGreen = new PIXI.Graphics();
            const ringBlue = new PIXI.Graphics();
            
            ringRed.blendMode = 'add';
            ringGreen.blendMode = 'add';
            ringBlue.blendMode = 'add';
            
            const blurOptions = new PIXI.BlurFilter();
            blurOptions.strength = 20; // 讓邊緣混色更加柔和夢幻
            ringRed.filters = [blurOptions];
            ringGreen.filters = [blurOptions];
            ringBlue.filters = [blurOptions];

            vfxContainer.addChild(ringRed);
            vfxContainer.addChild(ringGreen);
            vfxContainer.addChild(ringBlue);

            // 核心閃光與星塵
            const coreFlash = new PIXI.Graphics();
            coreFlash.blendMode = 'add';
            const flashBlur = new PIXI.BlurFilter();
            flashBlur.strength = 40;
            coreFlash.filters = [flashBlur];
            vfxContainer.addChild(coreFlash);

            const sparkContainer = new PIXI.Container();
            vfxContainer.addChild(sparkContainer);
            let activeSparks = [];

            // ----------------------------------------------------
            // 動畫邏輯
            // ----------------------------------------------------
            let isAnimating = false;
            let expTime = 0;
            let expX = 0;
            let expY = 0;

            function triggerExplosion(x, y) {
                expX = x;
                expY = y;
                expTime = 0;
                
                shockwaveFilter.center.x = x;
                shockwaveFilter.center.y = y;
                shockwaveFilter.time = 0;

                sparkContainer.removeChildren();
                activeSparks = [];

                // 噴射的行星碎屑 (火花)
                for(let i = 0; i < 60; i++) {
                    const spark = new PIXI.Graphics();
                    spark.blendMode = 'add';
                    
                    // 碎屑顏色：偏高溫的白、藍、橘
                    let color = 0xffffff;
                    let randColor = Math.random();
                    if(randColor > 0.7) color = 0x00f3ff;
                    else if(randColor > 0.4) color = 0xffaa00;
                    
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 300 + Math.random() * 2500;
                    const length = 5 + Math.random() * 40;
                    const thickness = 1 + Math.random() * 4;
                    
                    spark.rect(0, -thickness/2, length, thickness).fill(color);
                    spark.position.set(x, y);
                    spark.rotation = angle;
                    
                    sparkContainer.addChild(spark);
                    activeSparks.push({
                        sprite: spark,
                        vx: Math.cos(angle) * velocity,
                        vy: Math.sin(angle) * velocity,
                        life: 1.0, 
                        decayRate: 1.0 + Math.random() * 2.0
                    });
                }
                
                isAnimating = true;
            }

            app.ticker.add((ticker) => {
                if (!isAnimating) return;
                
                const dt = ticker.deltaMS / 1000;
                expTime += dt;
                
                const maxTime = 1.5;
                let progress = expTime / maxTime;
                if (progress > 1) progress = 1;
                
                let easeOut = 1 - Math.pow(progress, 2);

                // 1. 空間扭曲
                shockwaveFilter.time += dt;
                shockwaveFilter.amplitude = 80 * easeOut;

                // 2. 核心閃光 (極速消散)
                coreFlash.clear();
                let flashProgress = expTime / 0.2;
                if (flashProgress <= 1) {
                    let flashEase = 1 - Math.pow(flashProgress, 2);
                    coreFlash.alpha = flashEase;
                    coreFlash.circle(expX, expY, 400 * (1 - flashEase)).fill(0xffffff);
                }

                // ✨ 3. 三稜鏡爆炸環 (Radial Chromatic Aberration)
                ringRed.clear();
                ringGreen.clear();
                ringBlue.clear();
                
                // 衝擊波的基準半徑
                const baseRadius = shockwaveFilter.time * shockwaveFilter.speed; 
                // 光環厚度
                const thickness = 120 * easeOut; 
                
                if (thickness > 1) {
                    // 將紅綠藍的半徑微調，產生色差！
                    // 紅光擴散最快，藍光擴散最慢，符合光譜特性
                    const redRadius = baseRadius * 1.03;
                    const greenRadius = baseRadius * 1.00;
                    const blueRadius = baseRadius * 0.97;
                    
                    const alpha = easeOut * 0.8;
                    
                    // 畫三個顏色不同的實心光環邊緣
                    ringRed.alpha = alpha;
                    ringRed.circle(expX, expY, redRadius).stroke({ width: thickness, color: 0xff0000, alignment: 0.5 });
                    
                    ringGreen.alpha = alpha;
                    ringGreen.circle(expX, expY, greenRadius).stroke({ width: thickness, color: 0x00ff00, alignment: 0.5 });
                    
                    ringBlue.alpha = alpha;
                    ringBlue.circle(expX, expY, blueRadius).stroke({ width: thickness, color: 0x0000ff, alignment: 0.5 });
                }

                // 4. 星塵碎屑 (物理減速)
                for(let i = activeSparks.length - 1; i >= 0; i--) {
                    let s = activeSparks[i];
                    s.life -= dt * s.decayRate;
                    
                    if (s.life <= 0) {
                        sparkContainer.removeChild(s.sprite);
                        activeSparks.splice(i, 1);
                        continue;
                    }
                    
                    s.vx *= 0.92;
                    s.vy *= 0.92;
                    
                    s.sprite.x += s.vx * dt;
                    s.sprite.y += s.vy * dt;
                    s.sprite.alpha = s.life;
                    s.sprite.scale.x = Math.max(0, s.life); 
                }

                if (progress >= 1) {
                    isAnimating = false;
                    shockwaveFilter.amplitude = 0;
                }
            });

            // 綁定點擊事件
            app.canvas.addEventListener('pointerdown', (e) => {
                triggerExplosion(e.clientX, e.clientY);
            });

            // 首次展示
            setTimeout(() => triggerExplosion(window.innerWidth / 2, window.innerHeight / 2), 500);
        })();
    </script>
</body>
</html>
